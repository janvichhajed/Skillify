<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skillify - Peer-to-Peer Learning</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <!-- Atmospheric background -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  {% block navbar %}
  <!-- By default show public navbar, pages can override this block if needed -->
  <nav>
    <a href="/" class="nav-logo">skill<span>ify</span></a>
    
    <div class="nav-links">
      <a href="#" class="nav-link">How it works</a>
      <a href="#" class="nav-link">Browse skills</a>
      <a href="#" class="nav-link">Certificates</a>
    </div>
    
    <div>
      <a href="/login" class="nav-link" style="margin-right: 24px;">Log in</a>
      <a href="/signup" class="btn-primary" style="text-decoration: none;">Get started</a>
    </div>
  </nav>
  {% endblock %}

  {% block content %}{% endblock %}

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
