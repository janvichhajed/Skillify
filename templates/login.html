{% extends "base.html" %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="auth-layout fade-in">
  <!-- Left Panel -->
  <div class="auth-left">
    <div class="auth-orb"></div>
    
    <div class="auth-tagline">
      <h2>Exchange skills.</h2>
      <h2>Grow together.</h2>
      <p>Join the verified network of creators, engineers, and designers sharing practical knowledge.</p>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="auth-right">
    <div class="auth-form-container">
      <div class="auth-logo">skill<span>ify</span></div>
      
      <div class="auth-header">
        <h1>Welcome back</h1>
        <p>Sign in to your account</p>
      </div>

      <form action="/login" method="POST" class="auth-form" id="loginForm">
        <div class="form-group">
          <label class="section-label">Email address</label>
          <input type="email" name="email" placeholder="you@domain.com" required>
        </div>
        
        <div class="form-group">
          <label class="section-label">Password</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-primary btn-block">Sign in &rarr;</button>
      </form>

      <div class="auth-divider">or</div>

      <div class="auth-footer">
        No account? <a href="/signup">Sign up free</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
