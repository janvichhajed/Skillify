{% extends 'base.html' %}
{% block title %}Log in - Skillify{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mt-5">
    <div class="col-md-6 col-lg-4 col-xl-3 stagger-1" style="min-width: 380px;">
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center text-gradient mb-3">
                <i class="fa-solid fa-bolt" style="font-size: 3rem;"></i>
            </div>
            <h2 class="fw-bold text-dark mb-1">Welcome back</h2>
            <p class="text-muted small">Enter your credentials to access the platform.</p>
        </div>

        <div class="card-glass border-subtle shadow-ultra-lg p-4 p-md-5">
            {% if error %}
            <div class="alert alert-danger d-flex align-items-center rounded-3 mb-4 bg-white border border-danger border-opacity-25 text-danger" role="alert" style="font-size: 0.9rem;">
                <i class="fa-solid fa-circle-exclamation me-2"></i>
                <div>{{ error }}</div>
            </div>
            {% endif %}
            
            <form action="/auth/login" method="POST" class="needs-validation" novalidate>
                <div class="form-floating form-floating-clean mb-3">
                    <input type="email" name="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                    <label for="emailInput">Email address</label>
                </div>
                
                <div class="form-floating form-floating-clean mb-4">
                    <input type="password" name="password" class="form-control" id="passwordInput" placeholder="Password" required>
                    <label for="passwordInput">Password</label>
                </div>
                
                <button type="submit" class="btn-ultra btn-primary-ultra w-100 mb-4" style="height: 3.25rem;">Sign In</button>
            </form>
            
            <div class="text-center">
                <span class="text-muted" style="font-size: 0.9rem;">Don't have an account?</span> 
                <a href="{{ url_for('auth.signup_page') }}" class="text-primary fw-bold text-decoration-none ms-1" style="font-size: 0.9rem;">Sign up</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
