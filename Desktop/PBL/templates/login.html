{% extends 'base.html' %}
{% block title %}Log in - Skillify{% endblock %}

{% block content %}
<style>
    /* Reset main padding to allow edge-to-edge split */
    .main-content { padding: 0 !important; max-width: none !important; }
</style>

<div class="auth-split">
    <!-- Left Visual Panel -->
    <div class="auth-bg">
        <!-- Abstract gradient mesh matching the orb design for depth -->
        <div style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; background: radial-gradient(circle at 30% 70%, rgba(124,111,255,0.1), transparent 50%), radial-gradient(circle at 70% 30%, rgba(167,139,250,0.08), transparent 40%);"></div>
        <p class="fade-in">Exchange skills.<br>Grow together.</p>
    </div>
    
    <!-- Right Data Panel -->
    <div class="auth-form-wrap">
        <div class="auth-form-panel fade-in">
            <div style="text-align: center; margin-bottom: 32px;">
                <div class="logo" style="margin-bottom: 12px;">
                    <span class="base">skill</span><span class="accent">ify</span>
                </div>
                <h2 style="font-size: 20px; font-weight: 600; margin-bottom: 6px;">Sign in</h2>
                <p style="font-size: 13px; color: var(--t2);">Enter your details to access the network.</p>
            </div>

            {% if error %}
            <div class="pill pill-error"><i class="fa-solid fa-circle-exclamation" style="margin-right: 6px;"></i> {{ error }}</div>
            {% endif %}
            
            <form action="/auth/login" method="POST">
                <div class="form-group">
                    <label class="field-label" for="emailInput">Email Address</label>
                    <input type="email" name="email" id="emailInput" class="form-control" placeholder="name@example.com" required>
                </div>
                
                <div class="form-group" style="margin-bottom: 32px;">
                    <label class="field-label" for="passwordInput">Password</label>
                    <input type="password" name="password" id="passwordInput" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Continue</button>
            </form>
            
            <div style="margin-top: 32px; text-align: center; color: var(--t2); font-size: 13px;">
                <span>Don't have an account?</span> 
                <a href="{{ url_for('auth.signup_page') }}" style="color: var(--t1); font-weight: 500; margin-left: 4px;">Sign up instead</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
