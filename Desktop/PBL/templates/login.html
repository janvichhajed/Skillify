{% extends 'base.html' %}
{% block title %}Login - Skillify{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="text-center mb-4 fw-bold text-primary">Login to Skillify</h3>
            <form action="/dashboard" method="GET">
                <div class="mb-3">
                    <label class="form-label text-muted">Email address</label>
                    <input type="email" class="form-control form-control-lg" placeholder="Enter your email" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted">Password</label>
                    <input type="password" class="form-control form-control-lg" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">Login</button>
            </form>
            <div class="text-center">
                <span class="text-muted">Don't have an account?</span> <a href="/signup" class="text-decoration-none fw-bold">Sign up</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
