{% extends 'base.html' %}
{% block title %}Sign up - Skillify{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-panel animate-fade-up">
        <div class="glass-card">
            <div class="text-center mb-4">
                <i class="fa-solid fa-layer-group text-accent mb-3" style="font-size: 2.5rem;"></i>
                <h2>Create Account</h2>
                <p class="text-secondary text-sm">Join the platform to verify and exchange skills.</p>
            </div>

            {% if error %}
            <div class="alert badge-danger w-full text-center p-3 mb-4 rounded border">
                <i class="fa-solid fa-triangle-exclamation"></i> {{ error }}
            </div>
            {% endif %}
            
            <form action="/auth/signup" method="POST">
                <div class="form-group form-floating">
                    <input type="text" name="name" id="nameInput" placeholder=" " required>
                    <label for="nameInput">Full Name</label>
                </div>
                
                <div class="form-group form-floating">
                    <input type="email" name="email" id="emailInput" placeholder=" " required>
                    <label for="emailInput">Email address</label>
                </div>
                
                <div class="form-group form-floating">
                    <input type="password" name="password" id="passwordInput" placeholder=" " required>
                    <label for="passwordInput">Password</label>
                </div>
                
                <div class="form-group">
                    <label class="form-label">I am looking to...</label>
                    <select name="role" required>
                        <option value="learn">Learn a skill</option>
                        <option value="teach">Teach a skill</option>
                        <option value="both" selected>Both</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary w-full mt-2">Create Account</button>
            </form>
            
            <div class="text-center mt-4 pt-3" style="border-top: 1px solid var(--border);">
                <span class="text-secondary text-sm">Already have an account?</span> 
                <a href="{{ url_for('auth.login_page') }}" class="text-primary text-sm" style="font-weight: 500; margin-left: 4px;">Sign in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
