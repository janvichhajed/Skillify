{% extends 'base.html' %}
{% block title %}Sign Up - Skillify{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="text-center mb-4 fw-bold text-primary">Create an Account</h3>
            <form action="/dashboard" method="GET">
                <div class="mb-3">
                    <label class="form-label text-muted">Full Name</label>
                    <input type="text" class="form-control form-control-lg" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">Email address</label>
                    <input type="email" class="form-control form-control-lg" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">Password</label>
                    <input type="password" class="form-control form-control-lg" placeholder="Create a password" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted">I want to...</label>
                    <select class="form-select form-select-lg">
                        <option value="learn">Learn a skill</option>
                        <option value="teach">Teach a skill</option>
                        <option value="both">Both</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">Sign Up</button>
            </form>
            <div class="text-center">
                <span class="text-muted">Already have an account?</span> <a href="/login" class="text-decoration-none fw-bold">Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
