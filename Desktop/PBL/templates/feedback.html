{% extends 'base.html' %}
{% block title %}Feedback - Skillify{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-5 shadow-sm">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary mb-2">Leave Feedback</h3>
                <p class="text-muted">Your review helps mentors improve and others learners find the right match.</p>
            </div>
            
            <form>
                <div class="mb-4 bg-light p-3 rounded border">
                    <label class="form-label text-muted d-block mb-1 fs-6">Session</label>
                    <div class="fw-bold">Machine Learning Basics with Alice</div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold d-block">Overall Rating</label>
                    <div class="d-flex gap-2 fs-3 text-warning" style="cursor:pointer;">
                        <span>★</span><span>★</span><span>★</span><span>★</span><span class="text-muted">★</span>
                    </div>
                    <input type="hidden" name="rating" value="4">
                    <div class="form-text mt-1">Select a star to rate (1-5).</div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Written Review</label>
                    <textarea class="form-control" rows="5" placeholder="How was your experience? Would you recommend this mentor?" required></textarea>
                </div>

                <button type="submit" class="btn btn-success btn-lg w-100">Submit Review</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
