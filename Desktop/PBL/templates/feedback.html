{% extends 'base.html' %}
{% block title %}Leave Feedback - Skillify{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="fw-bold text-center mb-4">Rate Your Session</h2>
        <div class="card shadow-sm p-4">
            <p class="text-muted text-center mb-4">Your feedback helps mentors build their credibility score and keeps the community trustworthy.</p>
            
            <form action="/sessions/{{ session_id }}/feedback" method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold">Overall Rating (1 to 5 Stars)</label>
                    <select name="rating" class="form-select form-select-lg" required>
                        <option value="5">⭐⭐⭐⭐⭐ (5 - Excellent)</option>
                        <option value="4">⭐⭐⭐⭐ (4 - Very Good)</option>
                        <option value="3">⭐⭐⭐ (3 - Average)</option>
                        <option value="2">⭐⭐ (2 - Poor)</option>
                        <option value="1">⭐ (1 - Terrible)</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Written Review</label>
                    <textarea name="review_text" class="form-control" rows="4" placeholder="How was the mentor? Did you learn the skill?"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg w-100">Submit Feedback</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
