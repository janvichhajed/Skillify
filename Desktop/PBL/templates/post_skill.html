{% extends 'base.html' %}
{% block title %}Post a Skill - Skillify{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h3 class="fw-bold text-primary mb-3">Post a New Skill</h3>
            <div class="alert alert-info d-flex align-items-center mb-4">
                <span class="me-2 fs-4">ℹ️</span>
                <div>
                    <strong>Note:</strong> Only verified mentors can post new skills to teach. Make sure your profile is verified first!
                </div>
            </div>
            
            <form>
                <div class="mb-3">
                    <label class="form-label fw-bold">Skill Name</label>
                    <input type="text" class="form-control form-control-lg" placeholder="e.g., Advanced React Patterns, Node.js Basics" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Category</label>
                    <select class="form-select form-select-lg">
                        <option>Web Development</option>
                        <option>Data Science</option>
                        <option>Design</option>
                        <option>Marketing</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Description</label>
                    <textarea class="form-control" rows="5" placeholder="Describe what learners will gain from this, your teaching approach, and any prerequisites..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">Post Skill</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
